<!-- login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CEN Timetable - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      /* Maroon / burgundy field: echoes seal & keeps contrast with white card + #CC0000 button */
      background:
        radial-gradient(ellipse 95% 85% at 50% 0%, rgba(120, 32, 42, 0.55) 0%, transparent 52%),
        radial-gradient(ellipse 80% 70% at 100% 100%, rgba(90, 18, 28, 0.35) 0%, transparent 45%),
        radial-gradient(ellipse 70% 60% at 0% 85%, rgba(55, 12, 18, 0.5) 0%, transparent 42%),
        linear-gradient(162deg, #120506 0%, #2a0c10 22%, #4a1420 48%, #5c1a28 68%, #2d0d12 88%, #0d0405 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-card {
      background: #FFFFFF;
      border-radius: 20px;
      padding: 48px 40px;
      width: 420px;
      max-width: 100%;
      box-shadow: 0 24px 80px rgba(0,0,0,0.3);
    }
    .login-logo { text-align: center; margin-bottom: 32px; }
    .login-logo-img {
      display: block;
      width: 152px;
      height: auto;
      max-height: 120px;
      margin: 0 auto 12px;
      object-fit: contain;
    }
    .login-logo h1 { font-size: 20px; font-weight: 800; color: #1A1A2E; }
    .login-logo p { font-size: 13px; color: #616161; margin-top: 4px; }
    .login-form { display: flex; flex-direction: column; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label { font-size: 12px; font-weight: 600; color: #1A1A2E; }
    .form-input {
      padding: 9px 12px;
      border-radius: 8px;
      border: 1px solid #E0E0E0;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      transition: all 0.15s;
    }
    .form-input:focus {
      outline: none;
      border-color: #CC0000;
      box-shadow: 0 0 0 3px rgba(204,0,0,0.1);
    }
    .btn-primary {
      background: #CC0000;
      color: #fff;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      width: 100%;
      justify-content: center;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: #990000; }
    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: #9E9E9E;
    }
    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: #FEE2E2;
      color: #991B1B;
      border: 1px solid #FCA5A5;
    }
    .alert svg { flex-shrink: 0; margin-top: 1px; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <img class="login-logo-img" src="assets/cen_logo.png" alt="College of Engineering">
      <h1>College of Engineering</h1>
      <p><b>Southern Luzon State University</b></p>
    </div>
    <form class="login-form" id="loginForm" action="#" method="post" novalidate>
      <div id="loginErr"></div>
      <div class="form-group">
        <label class="form-label" for="loginEmail">Email Address</label>
        <input class="form-input" id="loginEmail" name="email" type="email" placeholder="Enter your email address" value="admin@slsu.edu.ph" autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label" for="loginPass">Password</label>
        <input class="form-input" id="loginPass" name="password" type="password" placeholder="Enter your password" value="password" autocomplete="current-password">
      </div>
      <button class="btn-primary" type="submit" id="loginBtn">Sign In &rarr;</button>
    </form>
    <div class="login-footer">
      <strong>Demo accounts:</strong> admin@slsu.edu.ph &middot; ie.chair@slsu.edu.ph &middot; cpe.chair@slsu.edu.ph<br>
      (any password works)
    </div>
  </div>

  <script>
    // Shared user data
    const USERS = [
      { id:'admin', name:'Dr. Maria Corazon B. Abejo', email:'admin@slsu.edu.ph', role:'admin', dept:null, initials:'MCA' },
      { id:'ie', name:'Engr. Lynnevel R. Amparo', email:'ie.chair@slsu.edu.ph', role:'chairperson', dept:'ie', initials:'LA' },
      { id:'ee', name:'Engr. Maurino N. Abuel', email:'ee.chair@slsu.edu.ph', role:'chairperson', dept:'ee', initials:'MA' },
      { id:'ce', name:'Engr. John Christopher D. Tayoto', email:'ce.chair@slsu.edu.ph', role:'chairperson', dept:'ce', initials:'JT' },
      { id:'me', name:'Engr. Ronnel S. Nombrefia', email:'me.chair@slsu.edu.ph', role:'chairperson', dept:'me', initials:'RN' },
      { id:'ece', name:'Engr. Pitz Gerald G. Lagrazon', email:'ece.chair@slsu.edu.ph', role:'chairperson', dept:'ece', initials:'PL' },
      { id:'cpe', name:'Engr. Julie Ann Susa-Gili', email:'cpe.chair@slsu.edu.ph', role:'chairperson', dept:'cpe', initials:'JS' },
    ];

    const loginForm = document.getElementById('loginForm');
    loginForm.addEventListener('submit', e => {
      e.preventDefault();
      doLogin();
    });
    // Enter from email/password: some browsers skip implicit submit for type="email" or block it behind validation.
    loginForm.addEventListener('keydown', e => {
      if (e.key !== 'Enter' || e.repeat || e.isComposing) return;
      if (e.target && e.target.tagName === 'INPUT') {
        e.preventDefault();
        doLogin();
      }
    });

    function doLogin() {
      const email = document.getElementById('loginEmail').value.trim();
      const user = USERS.find(u => u.email === email);
      const errEl = document.getElementById('loginErr');
      
      if (!user) {
        errEl.innerHTML = `<div class="alert"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span>No account found with that email address.</span></div>`;
        return;
      }
      
      // Store user in sessionStorage and redirect to main app (fresh demo data for new login)
      sessionStorage.removeItem('cen_app_state');
      sessionStorage.setItem('cen_user', JSON.stringify(user));
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
